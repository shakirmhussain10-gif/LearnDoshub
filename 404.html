<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>404 - Page Not Found | Elite Document Suite</title>
  <meta name="description" content="Page not found. Elite Document Suite offers 80+ free online tools for PDF, Image, Text, Audio, Video and more.">
  <meta name="robots" content="noindex, follow">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
    }
    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --accent: #4f46e5;
      --accent-hover: #6366f1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .error-container {
      text-align: center;
      max-width: 500px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 12px; }
    p { color: var(--text-secondary); margin-bottom: 32px; line-height: 1.6; }
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .home-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }
    .quick-links {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .quick-links a {
      padding: 10px 18px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .quick-links a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>Oops! The page you're looking for doesn't exist. It might have been moved or deleted.</p>
    <a href="/" class="home-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Go to Homepage
    </a>
    <div class="quick-links">
      <a href="pdf-tools.html">PDF Tools</a>
      <a href="image-tools.html">Image Tools</a>
      <a href="video-tools.html">Video Tools</a>
      <a href="audio-tools.html">Audio Tools</a>
      <a href="chat.html">AI Chat</a>
    </div>
  </div>
  <script>
    // Try to load saved theme
    try {
      const theme = localStorage.getItem('eds-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) {}
  </script>
</body>
</html>
