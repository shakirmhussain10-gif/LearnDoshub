function addMessage(text, isUser = false, related = []) {
  const messagesDiv = document.getElementById('chatMessages');
  const welcomeMsg = document.getElementById('welcomeMsg');
  if (welcomeMsg) welcomeMsg.style.display = 'none';

  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  
  let relatedHTML = '';
  if (related && related.length > 0 && !isUser) {
    relatedHTML = `<div class="related-questions"><h4>Related Questions:</h4>${related.map(q => `<button class="related-btn" onclick="sendQuick('${q.replace(/'/g, "\\'")}')">${q}</button>`).join('')}</div>`;
  }
  
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${isUser ? 'user' : 'ai'}`;
  msgDiv.innerHTML = `${text}${relatedHTML}<div class="time">${time}</div>`;
  
  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showTyping() {
  document.getElementById('typingIndicator').classList.add('show');
  document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
}

function hideTyping() { document.getElementById('typingIndicator').classList.remove('show'); }

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  const message = input.value.trim();
  
  if (!message || btn.disabled) return;

  btn.disabled = true;
  input.value = '';
  addMessage(message, true);
  showTyping();

  try {
    const lang = detectLanguage(message);
    const systemPrompt = `You are LearnDocs Hub AI Assistant. We have 100+ FREE tools: PDF (Merge, Split, Compress, Convert, Edit, Watermark), Image (Resize, Compress, Crop, Convert, Remove BG, OCR), Text (Word Counter, QR, Barcode, Password Generator, JSON Formatter), Calculators (Loan, BMI, Age, GST, Unit Converter), Audio (Converter, Trimmer, Volume, Speed), Video (Converter, Compressor, GIF, Trimmer, Speed), Social Media (Instagram Resizer, YouTube Thumbnail). 

Rules:
1. ALWAYS answer in the same language as user (English, Urdu, or Hindi detected from their message)
2. For tool queries, recommend relevant tool and provide direct link like <a href="pdf-tools.html" class="tool-link">PDF Tools</a>
3. Always mention that our service is 100% FREE - no charges, no login, no ads
4. Provide contact info if asked: Email: shakirmhussain12@gmail.com, WhatsApp: 03448706991
5. Be helpful, friendly, and concise
6. For related questions, suggest 2-3 follow-up questions

User language: ${lang === 'ur' ? 'Urdu' : lang === 'hi' ? 'Hindi' : 'English'}`;

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${GROQ_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: message }
        ],
        temperature: 0.7,
        max_tokens: 500
      })
    });

    const data = await response.json();
    const aiResponse = data.choices?.[0]?.message?.content || 'Sorry, something went wrong. Please try again.';
    
    addMessage(aiResponse, false, ['Show me all tools', 'Is it free?']);
  } catch (error) {
    console.error('API Error:', error);
    const lang = detectLanguage(message);
    const fallback = getResponse(message, lang);
    addMessage(fallback.text + '<br><small>(Using offline mode)</small>', false, fallback.related);
  }
  
  hideTyping();
  btn.disabled = false;
  input.focus();
}

function sendQuick(message) {
  document.getElementById('chatInput').value = message;
  sendMessage();
}

function clearChat() {
  if (confirm('Clear all chat history?')) {
    document.getElementById('chatMessages').innerHTML = `
      <div class="welcome-message" id="welcomeMsg">
        <h2>Hi! I'm Your Free AI Assistant 🤖</h2>
        <p>Ask me anything - writing, coding, homework help, or find tools. Completely <strong>FREE</strong> - no login needed!</p>
        <div class="quick-actions">

          <button class="quick-btn" onclick="sendQuick('I need to compress a video')">🎬 Compress Video</button>
          <button class="quick-btn" onclick="sendQuick('Help me write a resume')">📝 Write Resume</button>
        </div>
      </div>
    `;
  }
}

// Load theme
  try {
    const pageThemes = JSON.parse(localStorage.getItem('eds-page-themes') || '{}');
    const globalTheme = localStorage.getItem('eds-theme') || 'dark';
    const pageTheme = pageThemes['chat.html'];
    const activeTheme = (pageTheme && pageTheme !== 'default') ? pageTheme : globalTheme;
    document.documentElement.setAttribute('data-theme', activeTheme);
  } catch(e) {}

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('eds-theme', next);
  }
