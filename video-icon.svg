<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="videoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#videoGrad)"/>
  <!-- Video frame -->
  <rect x="50" y="50" width="100" height="100" fill="white" opacity="0.95" rx="8"/>
  <!-- Play button -->
  <circle cx="100" cy="100" r="35" fill="none" stroke="#f97316" stroke-width="3" opacity="0.5"/>
  <path d="M90 80 L90 120 L125 100 Z" fill="#f97316"/>
  <!-- Creator mark -->
  <circle cx="160" cy="30" r="18" fill="white" opacity="0.9"/>
  <text x="160" y="38" font-size="9" font-weight="bold" fill="#f97316" text-anchor="middle">MHS</text>
</svg>
