<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - Elite Document Suite</title>
<meta name="robots" content="noindex">
<style>
body{font-family:system-ui;background:#0f172a;color:#fff;padding:40px 20px}
.box{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;max-width:500px;margin:0 auto}
input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #334155;background:#334155;color:#fff;box-sizing:border-box}
button{width:100%;padding:14px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;margin-top:8px}
.msg{padding:12px;margin:10px 0;border-radius:6px;text-align:center}
.ok{background:rgba(16,185,129,0.2);color:#10b981}
.err{background:rgba(239,68,68,0.2);color:#ef4444}
h2{text-align:center}
label{display:block;margin:12px 0 4px}
.link{text-align:center;margin-top:12px}
.link a{color:#6366f1}
</style>
</head>
<body>

<div class="box">
<h2>💰 Set Affiliate Links</h2>
<p style="color:#94a3b8;text-align:center;margin-bottom:20px;">Links will appear in popup after tool download</p>

<label>PDF Tools Link:</label>
<input type="url" id="pdfLink" placeholder="https://example.com/pdf-software">

<label>Image Tools Link:</label>
<input type="url" id="imgLink" placeholder="https://example.com/image-software">

<label>Video/Audio Tools Link:</label>
<input type="url" id="videoLink" placeholder="https://example.com/media-software">

<label>Business Tools Link:</label>
<input type="url" id="bizLink" placeholder="https://example.com/business-software">

<label>General Link (Fallback):</label>
<input type="url" id="genLink" placeholder="https://example.com">

<button onclick="saveLinks()">Save Links</button>
<div class="msg ok" id="msg" style="display:none"></div>

<div class="link">
<a href="index.html">← Back to Home</a>
</div>
</div>

<script>
// Default links - EDIT HERE TO CHANGE LINKS
let affiliateLinks = {
  pdf: '',
  image: '',
  video: '',
  business: '',
  general: ''
};

// Load from localStorage on page load
function loadLinks() {
  const saved = localStorage.getItem('affiliate_links');
  if (saved) {
    affiliateLinks = JSON.parse(saved);
  }
  
  document.getElementById('pdfLink').value = affiliateLinks.pdf || '';
  document.getElementById('imgLink').value = affiliateLinks.image || '';
  document.getElementById('videoLink').value = affiliateLinks.video || '';
  document.getElementById('bizLink').value = affiliateLinks.business || '';
  document.getElementById('genLink').value = affiliateLinks.general || '';
  
  console.log('Loaded links:', affiliateLinks);
}

// Save to localStorage
function saveLinks() {
  affiliateLinks = {
    pdf: document.getElementById('pdfLink').value,
    image: document.getElementById('imgLink').value,
    video: document.getElementById('videoLink').value,
    business: document.getElementById('bizLink').value,
    general: document.getElementById('genLink').value
  };
  
  localStorage.setItem('affiliate_links', JSON.stringify(affiliateLinks));
  
  const msg = document.getElementById('msg');
  msg.textContent = '✓ Links saved! They will appear after page refresh.';
  msg.className = 'msg ok';
  msg.style.display = 'block';
  
  console.log('Saved links:', affiliateLinks);
}

loadLinks();
</script>

</body>
</html>
