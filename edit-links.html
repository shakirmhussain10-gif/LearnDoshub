<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit Affiliate Links</title>
<style>
body{font-family:system-ui;background:#0f172a;color:#fff;padding:40px 20px}
.box{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;max-width:600px;margin:0 auto}
h2{text-align:center}
label{display:block;margin:12px 0 4px}
input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #334155;background:#334155;color:#fff;box-sizing:border-box}
button{width:100%;padding:14px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;margin-top:16px}
.msg{padding:12px;margin:10px 0;border-radius:6px;text-align:center;background:rgba(16,185,129,0.2);color:#10b981}
.note{background:#334155;padding:12px;border-radius:8px;font-size:14px;color:#94a3b8;margin-bottom:20px}
</style>
</head>
<body>

<div class="box">
<h2>💰 Edit Affiliate Links</h2>

<div class="note">
<b>Tareeka:</b> Links enter karein aur "Save" click karein. File download hogi. Usko apni project folder mein >affiliate-links<b.json</b> naam se save kar dein.
</div>

<label>PDF Tools Link:</label>
<input type="url" id="pdf" placeholder="https://example.com/pdf">

<label>Image Tools Link:</label>
<input type="url" id="image" placeholder="https://example.com/image">

<label>Video/Audio Link:</label>
<input type="url" id="video" placeholder="https://example.com/media">

<label>Business Tools Link:</label>
<input type="url" id="business" placeholder="https://example.com/business">

<label>General Link (Fallback):</label>
<input type="url" id="general" placeholder="https://example.com">

<button onclick="downloadJson()">Save & Download JSON</button>

<div class="msg" id="msg" style="display:none">
✓ JSON file download hone lagi...<br>
<small>File ko <b>affiliate-links.json</b> naam se save karein</small>
</div>
</div>

<script>
function downloadJson() {
  const data = {
    pdf: document.getElementById('pdf').value,
    image: document.getElementById('image').value,
    video: document.getElementById('video').value,
    business: document.getElementById('business').value,
    general: document.getElementById('general').value
  };
  
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = url;
  a.download = 'affiliate-links.json';
  a.click();
  
  document.getElementById('msg').style.display = 'block';
}
</script>

</body>
</html>
